<!DOCTYPE html>
<html>
<head>
    <title>Confirm Order</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            padding:30px;

            background:
            linear-gradient(
                rgba(11,44,87,.80),
                rgba(11,44,87,.80)
            ),
            url("../images/photo.jpg");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        /* Title */

        h1{

            color:white;

            font-size:42px;

            margin-bottom:20px;

            text-shadow:
            0 5px 15px rgba(0,0,0,.3);
        }

        /* Product Info */

        body > p{

            width:700px;
            max-width:95%;

            background:rgba(255,255,255,.95);

            padding:18px;

            border-radius:15px;

            margin-bottom:20px;

            text-align:center;

            font-size:18px;

            font-weight:600;

            color:#0b2c57;

            box-shadow:
            0 10px 25px rgba(0,0,0,.15);
        }

        /* Form Card */

        form{

            width:700px;

            max-width:95%;

            background:rgba(255,255,255,.97);

            padding:35px;

            border-radius:25px;

            box-shadow:
            0 20px 50px rgba(0,0,0,.25);

            animation:fadeUp .8s ease;
        }

        /* Django Form Styling */

        form p{
            margin-bottom:18px;
        }

        form label{

            display:block;

            margin-bottom:8px;

            color:#0b2c57;

            font-weight:600;
        }

        form input,
        form select,
        form textarea{

            width:100%;

            padding:14px;

            border:2px solid #ddd;

            border-radius:12px;

            font-size:15px;

            transition:.3s;
        }

        form input:focus,
        form select:focus,
        form textarea:focus{

            outline:none;

            border-color:#0b2c57;

            box-shadow:
            0 0 15px rgba(11,44,87,.15);

            transform:scale(1.01);
        }

        /* Confirm Button */

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(
                135deg,
                #16a34a,
                #15803d
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
            0 10px 25px rgba(0,0,0,.18);
        }

        /* Animation */

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){

            h1{
                font-size:30px;
                text-align:center;
            }

            form{
                padding:25px;
            }
        }

    </style>
</head>
<body>

<h1>Confirm Order</h1>

<p>
    Product:
    {{ order.product.title }}
</p>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Confirm Order
    </button>

</form>
<script>

document.querySelectorAll(
'input, textarea, select'
).forEach(field=>{

    field.addEventListener('focus',()=>{

        field.style.transform='scale(1.01)';
    });

    field.addEventListener('blur',()=>{

        field.style.transform='scale(1)';
    });

});

</script>
</body>
</html>
