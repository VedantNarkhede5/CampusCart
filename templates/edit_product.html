<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;

            background:
            linear-gradient(
                rgba(11,44,87,.80),
                rgba(11,44,87,.80)
            ),
            url("../images/photo.jpg");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        /* Page Title */

        h1{

            position:absolute;

            top:30px;

            left:50%;

            transform:translateX(-50%);

            color:white;

            font-size:42px;

            font-weight:bold;

            text-shadow:
            0 5px 15px rgba(0,0,0,.3);
        }

        /* Form Card */

        form{

            width:800px;

            max-width:95%;

            background:rgba(255,255,255,.97);

            padding:40px;

            border-radius:25px;

            box-shadow:
            0 20px 50px rgba(0,0,0,.25);

            animation:slideUp .8s ease;
        }

        /* Django Form Fields */

        form p{
            margin-bottom:18px;
        }

        form label{

            display:block;

            margin-bottom:8px;

            color:#0b2c57;

            font-weight:600;

            font-size:15px;
        }

        form input,
        form textarea,
        form select{

            width:100%;

            padding:14px;

            border:2px solid #ddd;

            border-radius:12px;

            font-size:15px;

            transition:.3s;
        }

        form textarea{
            min-height:130px;
        }

        form input:focus,
        form textarea:focus,
        form select:focus{

            outline:none;

            border-color:#0b2c57;

            box-shadow:
            0 0 15px rgba(11,44,87,.15);

            transform:scale(1.01);
        }

        /* File Upload */

        input[type="file"]{

            background:#f5f7fb;

            padding:12px;
        }

        /* Save Button */

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(
                135deg,
                #0b2c57,
                #14417a
            );

            color:white;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
            0 10px 25px rgba(0,0,0,.15);
        }

        /* Animation */

        @keyframes slideUp{

            from{

                opacity:0;

                transform:
                translateY(30px);
            }

            to{

                opacity:1;

                transform:
                translateY(0);
            }
        }

        @media(max-width:768px){

            body{
                padding:15px;
            }

            h1{
                font-size:30px;
                top:20px;
            }

            form{
                padding:25px;
            }
        }

    </style>
</head>
<body>

<h1>Edit Listing</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Changes
    </button>

</form>
<script>

document.querySelectorAll(
'input, textarea, select'
).forEach(field=>{

    field.addEventListener('focus',()=>{

        field.style.transform='scale(1.01)';
    });

    field.addEventListener('blur',()=>{

        field.style.transform='scale(1)';
    });

});

/* Smooth page load */

window.addEventListener('load',()=>{

    document.querySelector('form')
    .style.opacity='1';

});

</script>
</body>
</html>
