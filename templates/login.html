<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f1e8;
            padding:20px;
        }

        /* Main Card */
        .login-wrapper{
            width:1100px;
            max-width:95%;
            background:#fff;
            border-radius:25px;
            overflow:hidden;
            display:flex;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
        }

        /* Left Image Section */
        .login-image{
            flex:1;
            background:url("../images/image.png");
            background-size:cover;
            background-position:center;
            min-height:650px;
        }

        .left-side{
            width:45%;
            padding:30px;
            background:white;
        }

        .left-side img{
            width:100%;
            height:100%;
            max-height:650px;
            object-fit:cover;
            border-radius:25px;
            display:block;
        }

        /* Right Form Section */
        .login-container{
            flex:1;
            padding:60px;
            background:#fff;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        h1{
            color:#111;
            font-size:42px;
            margin-bottom:15px;
        }

        .subtitle{
            color:#777;
            margin-bottom:35px;
            line-height:1.5;
        }

        .error{
            color:#e53935;
            margin-bottom:15px;
            font-weight:600;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:15px 18px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
            margin-bottom:20px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#f4c400;
            box-shadow:0 0 10px rgba(244,196,0,0.2);
        }

        /* Login Button */
        button{
            width:100%;
            padding:15px;
            background:#f4c400;
            border:none;
            border-radius:10px;
            color:#000;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#e6b800;
            transform:translateY(-2px);
        }

        /* Links */
        .signup-link{
            text-align:center;
            margin-top:25px;
            color:#666;
        }

        .signup-link a{
            text-decoration:none;
            color:#000;
            font-weight:700;
        }

        .signup-link a:hover{
            text-decoration:underline;
        }

        .forgot-password{
            text-align:right;
            margin-bottom:20px;
        }

        .forgot-password a{
            text-decoration:none;
            color:#2b67f6;
            font-weight:600;
        }

        /* Animation */
        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .login-wrapper{
            animation:fadeIn 0.8s ease;
        }

        /* Mobile */
        @media(max-width:900px){

            .login-wrapper{
                flex-direction:column;
            }

            .login-image{
                height:300px;
                min-height:300px;
            }

            .login-container{
                padding:35px;
            }

            h1{
                font-size:32px;
            }
        }
    </style>
</head>

<body>


    <div class="login-wrapper">

        <div class="left-side">
            {% load static %}
            <img src="{% static 'images/photo.jpg' %}" alt="Student">
        </div>
        <div class="login-container">

            <div class="logo">
                CampusCart
            </div>

            <h1>Welcome Back!</h1>

            <p class="subtitle">
                Login to your CampusCart account
            </p>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter Email" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter Password" required>

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="signup-link">
                Don't have an account?
                <a href="/signup/">Create Account</a>
            </div>

        </div>

    </div>

    <script>
        const inputs = document.querySelectorAll("input");

        inputs.forEach(input => {

            input.addEventListener("focus", () => {
                input.style.transform = "scale(1.02)";
                input.style.transition = "0.3s";
            });

            input.addEventListener("blur", () => {
                input.style.transform = "scale(1)";
            });

        });
    </script>

</body>
</html>
